items:
  - image: ./assets/img/highlight-dynamic-wpt.png
    image_alt: Dynamic wireless power transfer charging lane with segmented transmitter coils
    title: Dynamic WPT Based on Sparse Coil Arrays
    summary: Develops rectangular solenoidal pads and an alternately arranged segmented transmitter track with magnetic-field complementation, improving misalignment tolerance while suppressing output-power fluctuation and enabling large coil spacing in dynamic wireless power transfer.
    slides: ./assets/files/20241127-YPCASForum-Anti-Misalignment-Magnetic-Coupler.pdf
    video: ""

  - image: ./assets/img/highlight-neural-ode-modeling.png
    image_alt: Neural ODE modeling structure for a grid-tied power electronic converter
    title: Power Electronics Modeling Based on Neural ODE
    summary: Uses neural ordinary differential equations to model the fast inner-loop, switching, and filter dynamics of power electronic converters, enabling accurate coarse-step simulation while substantially reducing computational time.
    slides: ""
    video: ""
