# about me
first-paragraph: I am an Associate Professor at <a href="https://www.scut.edu.cn/en/" target="_blank" rel="noopener">South China University of Technology</a>, Guangzhou, China. Prior to that, I was a Postdoctoral Fellow under UM Talent Program with <a href="https://ime.um.edu.mo/" target="_blank" rel="noopener">the State Key Laboratory of Analog and Mixed-Signal VLSI (AMSV), University of Macau</a>, Macao, China.
second-paragraph: Dr. Huang serves as an Associate Editor for IEEE Transactions on Consumer Electronics and a Guest Editor for IEEE Open Journal of Circuits and Systems. He is also an active peer reviewer for various top IEEE journals and has been recognized with 4 reviewer awards from IEEE journals.

